name: Run commitizen commit message check via poetry

on:
  workflow_call:
    inputs:
      python-version:
        required: false
        type: string
        default: "3.11"
      rev-range:
        required: false
        type: string
        default: dev..$GITHUB_REF_NAME

jobs:
  commitizencheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      # for poetry caching, we have to install poetry before setting up python
      - name: Install poetry
        run: pipx install poetry
      - uses: actions/setup-python@v4
        with:
          cache: 'poetry'
          cache-dependency-path: "pyproject.toml"
          python-version: ${{ inputs.python-version }}
      - name: Install dev dependencies
        run: |
          poetry install --no-root --no-directory --only dev
      - name: Run commitizen check
        run: |
          poetry run cz check --rev-range ${{ inputs.rev-range }}
